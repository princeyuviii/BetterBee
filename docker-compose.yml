# =============================================================================
# BetterBee — Local Development Infrastructure
# =============================================================================
# Default: Redis only (~30MB RAM)
# Optional: PostgreSQL via --profile local-db (~100MB RAM)
#
# Usage:
#   docker compose up -d                    # Redis only
#   docker compose --profile local-db up -d # Redis + PostgreSQL
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: betterbee-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Optional local PostgreSQL (use --profile local-db)
  # Skip this if using Supabase
  postgres:
    image: postgres:15-alpine
    container_name: betterbee-postgres
    profiles: ["local-db"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: betterbee
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
